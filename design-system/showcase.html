<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Attendify · Studio Linear-Soft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* Tokens mirrored from lib/theme/studio_tokens.dart */
    :root {
      --surface-base: #0B0F1A;
      --surface-raised: #0F1320;
      --border-subtle: #1E2330;
      --text-primary: #FFFFFF;
      --text-secondary: #E4E7EB;
      --text-tertiary: #8A94A6;
      --text-muted: #6B7280;
      --accent-primary: #5E6AD2;
    }
    body {
      background: var(--surface-base);
      color: var(--text-secondary);
      font-family: 'Inter', system-ui, sans-serif;
      margin: 0;
      padding: 64px;
    }
    h1 {
      font-size: 40px;
      letter-spacing: -1.5px;
      color: var(--text-primary);
      font-weight: 600;
    }
    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      letter-spacing: 2px;
      font-weight: 700;
    }
    .row {
      padding: 20px 0;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .row:last-child { border-bottom: 1px solid var(--border-subtle); }
    .row .num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent-primary);
    }
    .row .label-text { flex: 1; }
  </style>
</head>
<body>
  <!-- See spec §4.1. This is a static reference, not the live app. -->
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:56px;">
    <div style="width:8px;height:8px;background:var(--accent-primary);border-radius:50%;box-shadow:0 0 12px var(--accent-primary);"></div>
    <span style="font-size:14px;font-weight:600;">Attendify</span>
    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-left:auto;">v1.0</span>
  </div>
  <div class="label">01 / WELCOME</div>
  <h1 style="margin: 12px 0 16px;">Track your attendance, calmly.</h1>
  <p style="font-size:14px;color:var(--text-tertiary);line-height:1.55;max-width:320px;">A precision tool for students who care about the 75% line. No noise, no clutter.</p>
  <div style="margin-top:40px;">
    <div class="row"><span class="num">01</span><span class="label-text">Student Portal</span><span style="color:var(--text-muted);">→</span></div>
    <div class="row"><span class="num">02</span><span class="label-text">Teacher Portal</span><span style="color:var(--text-muted);">→</span></div>
  </div>
</body>
</html>
